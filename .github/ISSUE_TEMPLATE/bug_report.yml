name: Bug report
description: Reporte um comportamento incorreto
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumo
      description: Descreva o problema de forma objetiva.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Como reproduzir
      description: Liste os passos para reproduzir o problema.
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Informe versao do pacote, PHP, dependencias ou logs relevantes.